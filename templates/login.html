<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Marking Planner</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(100, 70, 20, 0.12);
            text-align: center;
        }
        .auth-otter { font-size: 3rem; margin-bottom: 0.5rem; display: inline-block; animation: otter-bob 3s ease-in-out infinite; }
        .auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.2rem; }
        .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .auth-form { text-align: left; }
        .auth-field { margin-bottom: 1rem; }
        .auth-field label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.35rem; }
        .auth-field input {
            width: 100%; padding: 0.75rem 1rem;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 0.95rem; background: var(--bg-card);
            transition: border-color 0.2s; color: var(--text-primary);
        }
        .auth-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,157,143,0.12); }
        .auth-btn {
            width: 100%; padding: 0.875rem; background: var(--accent); color: white;
            border: none; border-radius: 50px; font-size: 1rem; font-weight: 600;
            cursor: pointer; margin-top: 0.5rem; transition: background 0.2s, transform 0.15s;
        }
        .auth-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .auth-footer { margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }
        .flash-msg { background: #fff0ee; border: 1.5px solid var(--danger); border-radius: 8px; color: var(--danger); padding: 0.75rem 1rem; margin-bottom: 1.25rem; font-size: 0.9rem; text-align: left; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-otter">🦦</div>
        <div class="auth-title">Marking Planner</div>
        <div class="auth-subtitle">Sign in to your account</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form class="auth-form" method="POST">
            <div class="auth-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus autocomplete="email">
            </div>
            <div class="auth-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="auth-btn">Sign in</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
    </div>
</body>
</html>
